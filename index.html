<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <meta name="theme-color" content="#0d1b4b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Chess Quest</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#0d1b4b; }
    body { font-family:"Fredoka One","Nunito",-apple-system,BlinkMacSystemFont,sans-serif; -webkit-font-smoothing:antialiased; }
    #loading { position:fixed; inset:0; background:linear-gradient(180deg,#0d1b4b,#1a2a6a); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:9999; }
    #loading .piece { font-size:64px; animation:bob 1.5s ease-in-out infinite; }
    #loading .text  { font-size:14px; color:rgba(255,255,255,.5); font-weight:700; letter-spacing:2px; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  </style>
</head>
<body>
  <div id="loading">
    <div class="piece">♟️</div>
    <div class="text">LOADING CHESS QUEST…</div>
  </div>
  <div id="root"></div>

  <!-- Firebase config loaded from config.js (gitignored, not committed) -->
  <script src="/config.js"></script>

  <!-- Firebase v10 — loaded as a real ES module (only way to use dynamic CDN imports) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, signInWithPopup, signInWithEmailAndPassword,
      createUserWithEmailAndPassword, GoogleAuthProvider,
      signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            window.__ENV?.CHESS_QUEST_API_KEY        || "",
      authDomain:        window.__ENV?.CHESS_QUEST_AUTH_DOMAIN    || "",
      projectId:         window.__ENV?.CHESS_QUEST_PROJECT_ID     || "",
      storageBucket:     window.__ENV?.CHESS_QUEST_STORAGE_BUCKET || "",
      messagingSenderId: window.__ENV?.CHESS_QUEST_SENDER_ID      || "",
      appId:             window.__ENV?.CHESS_QUEST_APP_ID         || "",
    };

    const app = initializeApp(firebaseConfig);

    // Expose everything the main app needs on a global object
    window.__firebase = {
      auth: getAuth(app),
      db: getFirestore(app),
      googleProvider: new GoogleAuthProvider(),
      signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signOut, onAuthStateChanged, doc, getDoc, setDoc,
    };
  </script>

  <!-- React 18 -->
  <script crossorigin
    src="https://unpkg.com/react@18/umd/react.production.min.js"
    crossorigin="anonymous"></script>

  <!-- ReactDOM 18 -->
  <script crossorigin
    src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    crossorigin="anonymous"></script>

  <!-- Babel standalone for JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"
    crossorigin="anonymous"></script>

  <script>
    window.__chessQuestReady = () => {
      const el = document.getElementById('loading');
      if(el) el.style.display = 'none';
    };

    // Safety fallback: if React renders before the ready callback is called,
    // remove the loading screen once the root has content.
    const hideLoadingWhenRendered = () => {
      const root = document.getElementById('root');
      const loading = document.getElementById('loading');
      if(root && loading && root.children.length > 0){
        loading.style.display = 'none';
      }
    };
    setInterval(hideLoadingWhenRendered, 300);
    // Surface any errors instead of hanging silently on loading screen
    function showError(label, e){
      const el = document.getElementById('loading');
      if(!el) return;
      const msg = (e && e.message) || e || 'Unknown error';
      const src = (e && e.filename) ? e.filename.split('/').pop() : 'unknown file';
      const line = (e && e.lineno) ? e.lineno : '?';
      const col = (e && e.colno) ? e.colno : '?';

      // Build DOM nodes safely instead of innerHTML (avoids XSS risk)
      el.textContent = '';
      const wrap = document.createElement('div');
      wrap.style.cssText = 'color:#fff;text-align:center;padding:20px;max-width:360px;font-family:monospace;';

      const icon = document.createElement('div');
      icon.style.cssText = 'font-size:40px;margin-bottom:12px;';
      icon.textContent = '⚠️';

      const title = document.createElement('div');
      title.style.cssText = 'font-size:14px;font-weight:700;margin-bottom:10px;';
      title.textContent = label; // label is always a trusted internal string

      const box = document.createElement('div');
      box.style.cssText = 'background:rgba(0,0,0,.3);border-radius:10px;padding:12px;text-align:left;font-size:11px;color:#ffeb3b;word-break:break-word;line-height:1.6;';

      const fileLine = document.createElement('div');
      fileLine.textContent = 'File: ' + src;
      const posLine = document.createElement('div');
      posLine.textContent = 'Line: ' + line + ', Col: ' + col;
      const msgLine = document.createElement('div');
      msgLine.style.marginTop = '8px';
      msgLine.textContent = 'Message: ' + msg;

      box.appendChild(fileLine);
      box.appendChild(posLine);
      box.appendChild(msgLine);
      wrap.appendChild(icon);
      wrap.appendChild(title);
      wrap.appendChild(box);
      el.appendChild(wrap);
    }
    window.addEventListener('error', (e) => showError('Script Error', e));
    window.addEventListener('unhandledrejection', (e) => showError('Promise Error', {message: e.reason?.message || e.reason}));
  </script>

  <!-- Chess Quest app -->
  <script type="text/babel" data-presets="react" src="/chess-quest.jsx"></script>
</body>
</html>
